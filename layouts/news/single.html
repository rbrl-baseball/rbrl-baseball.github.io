{{ define "header" }}
  {{ partials.Include "page-header.html" . }}
{{ end }}

{{ define "main" }}
  <article class="mw7 center ph3">
    <header class="mt4 w-100">
      <h1 class="f1 athelas mt3 mb1">{{ .Title }}</h1>
      <p class="f6 gray mv2">
        <time datetime="{{ .Date.Format "2006-01-02T15:04:05Z07:00" }}">{{- .Date | time.Format "January 2, 2006" -}}</time>
        {{- with .Params.author }} · <span class="author">{{ . }}</span>{{ end -}}
      </p>
    </header>
    <div class="bg-white br3 shadow-4 pa4 mv4">
      <div class="nested-copy-line-height lh-copy serif f4 nested-links mid-gray">
        {{- .Content -}}
      </div>
    </div>
  </article>
{{ end }}
