{{/* Floated article image shortcode */}}
{{/* Usage: {{< article-image src="/images/news/photo.jpg" alt="Description" >}} */}}
{{ $src := .Get "src" }}
{{ $alt := .Get "alt" | default "" }}
{{ $width := .Get "width" | default "250px" }}
<img src="{{ $src }}" alt="{{ $alt }}" class="article-image" style="float: left; max-width: {{ $width }}; margin: 0 1.5rem 1rem 0; border-radius: 6px;">
