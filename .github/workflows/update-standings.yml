name: Update Standings

on:
  schedule:
    # Run daily at 6am ET (10:00 UTC) during the season (April–June)
    - cron: "0 10 * 4-6 *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pyyaml

      - name: Update standings
        run: python scripts/update-standings.py

      - name: Commit if changed
        run: |
          git diff --quiet data/standings.json && exit 0
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/standings.json
          git commit -m "Update standings from GameChanger"
          git push
