name: Update Standings

on:
  schedule:
    # During the season (April–June), run twice daily:
    #   9pm ET = 01:00 UTC next day (catches evening games)
    #   6am ET = 10:00 UTC          (morning refresh / catches late entries)
    - cron: "0 1 * 4-6 *"
    - cron: "0 10 * 4-6 *"
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pyyaml

      - name: Update standings
        run: python scripts/update-standings.py

      - name: Commit if changed
        id: commit
        run: |
          if git diff --quiet data/standings.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/standings.json
          git commit -m "Update standings from GameChanger"
          git push
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Trigger site rebuild
        if: steps.commit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run hugo.yml --ref main
