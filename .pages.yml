media:
  - name: news-images
    label: News Images
    input: static/images/news
    output: /images/news
    categories: [image]
  - name: sponsor-logos
    label: Sponsor Logos
    input: static/images/sponsors
    output: /images/sponsors
    categories: [image]
  - name: team-logos
    label: Team Logos
    input: static/images/teams
    output: /images/teams
    categories: [image]

content:
  - name: news
    label: News
    type: collection
    path: content/news
    format: yaml-frontmatter
    exclude: ["_index.md"]
    filename:
      template: "{title}.md"
      field: create
    view:
      primary: title
      sort: date
      order: desc
      fields: [title, date, author]
    fields:
      - name: title
        label: Title
        type: string
        required: true
      - name: date
        label: Date
        type: date
        required: true
      - name: description
        label: Summary
        type: string
        description: Short description for previews and SEO
      - name: author
        label: Author
        type: string
      - name: body
        label: Content
        type: rich-text

  - name: pages
    label: Pages
    type: group
    items:
      - name: about
        label: About
        type: file
        path: content/about/index.md
        format: yaml-frontmatter
        fields:
          - name: title
            label: Title
            type: string
            hidden: true
          - name: description
            label: Description
            type: string
            hidden: true
          - name: featured_image
            type: string
            hidden: true
          - name: type
            type: string
            hidden: true
          - name: menu
            type: string
            hidden: true
          - name: body
            label: Content
            type: rich-text

      - name: schedule
        label: Schedule
        type: file
        path: content/schedule/index.md
        format: yaml-frontmatter
        fields:
          - name: title
            label: Title
            type: string
            hidden: true
          - name: description
            label: Description
            type: string
            hidden: true
          - name: featured_image
            type: string
            hidden: true
          - name: type
            type: string
            hidden: true
          - name: menu
            type: string
            hidden: true
          - name: body
            label: Content
            type: rich-text

      - name: history
        label: History
        type: file
        path: content/history/index.md
        format: yaml-frontmatter
        fields:
          - name: title
            label: Title
            type: string
            hidden: true
          - name: description
            label: Description
            type: string
            hidden: true
          - name: featured_image
            type: string
            hidden: true
          - name: type
            type: string
            hidden: true
          - name: menu
            type: string
            hidden: true
          - name: body
            label: Content
            type: rich-text

      - name: rules
        label: Rules
        type: file
        path: content/rules/index.md
        format: yaml-frontmatter
        fields:
          - name: title
            label: Title
            type: string
            hidden: true
          - name: description
            label: Description
            type: string
            hidden: true
          - name: featured_image
            type: string
            hidden: true
          - name: type
            type: string
            hidden: true
          - name: menu
            type: string
            hidden: true
          - name: body
            label: Content
            type: rich-text

      - name: teams-page
        label: Teams
        type: file
        path: content/teams/index.md
        format: yaml-frontmatter
        fields:
          - name: title
            label: Title
            type: string
            hidden: true
          - name: description
            label: Description
            type: string
            hidden: true
          - name: featured_image
            type: string
            hidden: true
          - name: type
            type: string
            hidden: true
          - name: layout
            type: string
            hidden: true
          - name: menu
            type: string
            hidden: true
          - name: body
            label: Content
            type: rich-text

      - name: sponsors-data
        label: Sponsors
        type: file
        path: data/sponsors.yaml
        format: yaml
        list: true
        view:
          fields: [name, url]
        fields:
          - name: name
            label: Sponsor Name
            type: string
            required: true
          - name: url
            label: Website URL
            type: string
            description: Full URL including https://
            pattern:
              regex: '^https?://.+'
              message: "Must start with http:// or https://"
          - name: logo
            label: Logo
            type: image
            required: true
            description: Recommended size ~200x100, PNG/JPG/SVG
            options:
              media: sponsor-logos

      - name: sponsors-page
        label: Sponsors Page
        type: file
        path: content/sponsors/index.md
        format: yaml-frontmatter
        fields:
          - name: title
            label: Title
            type: string
            hidden: true
          - name: description
            label: Description
            type: string
            hidden: true
          - name: featured_image
            type: string
            hidden: true
          - name: type
            type: string
            hidden: true
          - name: layout
            type: string
            hidden: true
          - name: menu
            type: string
            hidden: true
          - name: body
            label: Content
            type: rich-text